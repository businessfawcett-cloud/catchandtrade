services:
  - type: web
    name: catchandtrade-api
    env: node
    region: oregon
    buildCommand: cd apps/web && npm install --include=dev && npx prisma generate && npx next build --no-lint
    startCommand: cd apps/web && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
        value: postgresql://postgres:umvYuTBwUK3SJQng@db.ijnajdpcplapwiyvzsdh.supabase.co:5432/postgres
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
        value: https://ijnajdpcplapwiyvzsdh.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
        value: (your supabase service key - get from Supabase dashboard)
      - key: JWT_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_key_2025
      - key: JWT_REFRESH_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_refresh_key_2025
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.catchandtrade.com
      - key: NEXT_PUBLIC_WEB_URL
        value: https://catchandtrade.com
