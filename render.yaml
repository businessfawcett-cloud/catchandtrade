    startCommand: cd apps/web && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
        value: postgresql://neondb_owner:npg_sX5c2WEpPqwd@ep-lucky-bird-akkvyh6x-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: JWT_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_key_2025
