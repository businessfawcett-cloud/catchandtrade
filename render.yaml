services:
  - type: web
    name: catchandtrade-api
    env: node
    region: oregon
    buildCommand: cd apps/web && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd apps/web && npm run start
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_key_2025
      - key: JWT_REFRESH_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_refresh_key_2025
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.catchandtrade.com
      - key: NEXT_PUBLIC_WEB_URL
        value: https://catchandtrade.com
