services:
  - type: web
    name: catchandtrade-web
    env: node
    region: oregon
    buildCommand: cd apps/web && npm install --include=dev && npx prisma generate && npx next build --no-lint
    startCommand: cd apps/web && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://catchandtrade.com/api
      - key: NEXT_PUBLIC_WEB_URL
        value: https://catchandtrade.com
      - key: ADMIN_EMAILS
        sync: false
      - key: POKEMON_TCG_API_KEY
        sync: false
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false