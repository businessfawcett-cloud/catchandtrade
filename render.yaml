services:
  - type: web
    name: catchandtrade-api
    env: node
    region: oregon
    rootDir: apps/web
    buildCommand: npm install --prefix apps/web && npx prisma generate --schema=apps/web/prisma/schema.prisma && npm run build --prefix apps/web
    startCommand: npm run start --prefix apps/web
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_key_2025
      - key: JWT_REFRESH_SECRET
        sync: false
        value: catchandtrade_super_secret_jwt_refresh_key_2025
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.catchandtrade.com
      - key: NEXT_PUBLIC_WEB_URL
        value: https://catchandtrade.com
