services:
  - type: web
    name: catchandtrade-web
    env: node
    region: oregon
    rootDir: apps/web
    buildCommand: echo "=== DEBUG: Current directory ===" && pwd && echo "=== DEBUG: Files in src/components ===" && ls -la src/components/ && echo "=== DEBUG: tsconfig.json paths ===" && cat tsconfig.json | grep -A5 paths && rm -rf node_modules .next && npm install && npx prisma generate && npx next build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_URL
        value: https://catchandtrade.com/api
      - key: NEXT_PUBLIC_WEB_URL
        value: https://catchandtrade.com
      - key: ADMIN_EMAILS
        sync: false
      - key: POKEMON_TCG_API_KEY
        sync: false
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false